name: sitou

services:

  # ── Frontend (Nginx serving SPA) ─────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: sitou-frontend          # nginx upstream: proxy_pass http://sitou-frontend:80
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal
      - proxy_net                            # visible to /opt/ops nginx

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build: ./backend
    container_name: sitou-api              # nginx upstream: proxy_pass http://sitou-api:8000
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql+asyncpg://sitou_user:${DB_PASSWORD}@db:5432/sitou_db
      - SECRET_KEY=${SECRET_KEY}
      - BACKEND_CORS_ORIGINS=["https://sitou.biasharys.com"]
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_USER}
      - S3_SECRET_KEY=${MINIO_PASSWORD}
      - S3_BUCKET=sitou-packs
      - SENTRY_DSN=https://c1acb7c44c4a4c11b2b440ab4259a690@o4511106245853184.ingest.de.sentry.io/4511106288058448
      - PUSH_PROVIDER=webpush
      - VAPID_PRIVATE_KEY=6Hg26ySbfz4_i-cf3t2IdG0cWf6DGf_Zc3UidkOgJ9I
      - VAPID_PUBLIC_KEY=BNQC2U0LMDuszpg_NmkMmh_v8_FuJUkCoC3o-Ew-X3fNzvJb4F8iBmxFXV55y3Z8u7KQ0-Rwyixz2BUL7ttgo50
      # Payment providers (set in .env or uncomment with real keys)
      - KKIAPAY_PUBLIC_KEY=${KKIAPAY_PUBLIC_KEY:-}
      - KKIAPAY_PRIVATE_KEY=${KKIAPAY_PRIVATE_KEY:-}
      - KKIAPAY_SECRET=${KKIAPAY_SECRET:-}
      - FEDAPAY_API_KEY=${FEDAPAY_API_KEY:-}
      - FEDAPAY_ENVIRONMENT=${FEDAPAY_ENVIRONMENT:-sandbox}
    volumes:
      - ./content:/app/content:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
      - proxy_net

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sitou-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sitou_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sitou_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitou_user -d sitou_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal                             # DB never touches proxy_net

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sitou-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sitou-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ── MinIO init (create bucket on first start) ─────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: sitou-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set sitou http://minio:9000 ${MINIO_USER} ${MINIO_PASSWORD};
      mc mb --ignore-existing sitou/sitou-packs;
      mc anonymous set download sitou/sitou-packs;
      exit 0;
      "
    networks:
      - internal

volumes:
  pgdata:
  miniodata:

networks:
  internal:
    driver: bridge                           # project-private, DB/Redis/MinIO stay here
  proxy_net:
    external: true                           # created by /opt/ops, shared with nginx

